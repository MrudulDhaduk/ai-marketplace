name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint & syntax check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_marketplace_test
      JWT_SECRET: ci-test-secret-not-used-in-production
      DB_SSL: "false"
      REDIS_ENABLED: "false"
      STORAGE_PROVIDER: local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Syntax check (node --check)
        run: npm run check

      - name: Run database migrations
        run: npm run migrate

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_SOCKET_URL: http://localhost:5000
      # Sentry DSN intentionally blank in CI — Sentry no-ops when unset
      REACT_APP_SENTRY_DSN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Suppress CRA treating warnings as errors in CI
          CI: "false"
