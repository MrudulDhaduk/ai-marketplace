name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, migrate & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_marketplace_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_marketplace_test
      JWT_SECRET: ci-test-secret-32-chars-minimum-ok
      CSRF_SECRET: ci-csrf-secret-32-chars-minimum-ok
      REFRESH_TOKEN_SECRET: ci-refresh-secret-32-chars-min-ok
      JWT_EXPIRES_IN: "15m"
      REFRESH_TOKEN_EXPIRES_DAYS: "30"
      DB_SSL: "false"
      REDIS_ENABLED: "false"
      STORAGE_PROVIDER: local
      UPLOAD_DIR: /tmp/test-uploads
      LOG_LEVEL: error

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Syntax check (node --check)
        run: npm run check

      - name: Run database migrations on test DB
        run: npm run migrate

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage/backend/
          retention-days: 7

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — test & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      REACT_APP_API_URL: http://localhost:5000
      REACT_APP_SOCKET_URL: http://localhost:5000
      REACT_APP_SENTRY_DSN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        run: npm run build
        env:
          CI: "false"
